repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb, "500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix, lf]

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
      - id: clippy
        args: [--release, --all-targets]

  # The hook above lints `default-members` (openinfer-server) with default
  # features, whose dep graph does not include the kimi-k2 crate, so it is
  # never compiled and never linted there. This local hook closes that hole —
  # but only when kimi-k2 source changes (the CUDA build is expensive), and
  # `--no-deps` keeps it scoped to the crate itself rather than its shared
  # workspace dependencies.
  - repo: local
    hooks:
      - id: clippy-kimi-k2
        name: clippy (kimi-k2, -D warnings)
        entry: cargo clippy -p openinfer-kimi-k2 --no-deps --release --features kernel-report --all-targets -- -D warnings
        language: system
        types: [rust]
        files: ^openinfer-kimi-k2/
        pass_filenames: false
      # The kimi-k2 hook above is --no-deps, so the kimi code living in
      # openinfer-kernels (ops/kimi_k2 + csrc) is never linted by it.
      - id: clippy-kernels-kimi
        name: clippy (kernels w/ kimi-k2, -D warnings)
        entry: cargo clippy -p openinfer-kernels --no-deps --release --features kimi-k2 --all-targets -- -D warnings
        language: system
        types: [rust]
        files: ^openinfer-kernels/
        pass_filenames: false
      - id: clippy-comm
        name: clippy (openinfer-comm, -D warnings)
        entry: cargo clippy -p openinfer-comm --no-deps --release --all-targets -- -D warnings
        language: system
        types: [rust]
        files: ^openinfer-comm/
        pass_filenames: false
